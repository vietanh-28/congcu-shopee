<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Áp Mã Shopee Thực Tế</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 border-t-4 border-orange-500">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Mở Nhanh Mã</h1>
            <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded border border-orange-200">Bản Đa Nền Tảng</span>
        </div>

        <div class="border-2 border-purple-400 rounded-xl p-4 mb-6">
            <label class="block text-xs font-semibold text-gray-500 mb-2">LINK SẢN PHẨM SHOPEE</label>
            <input type="text" id="shopeeLink" placeholder="https://shp.ee/..." 
                class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 mb-4 text-sm focus:outline-none focus:border-purple-500">
            
            <button onclick="pasteLink()" class="w-full bg-purple-600 text-white font-semibold py-3 rounded-lg mb-4 hover:bg-purple-700 transition shadow-sm">
                📋 Dán sản phẩm
            </button>
            
            <!-- Hai nút lựa chọn mã -->
            <div class="flex gap-2 mb-2">
                <button id="btnFb" onclick="processLink('facebook')" class="w-1/2 bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-1 shadow-sm">
                    📘 Mã Facebook
                </button>
                <button id="btnYt" onclick="processLink('youtube')" class="w-1/2 bg-red-600 text-white font-semibold py-3 rounded-lg hover:bg-red-700 transition flex items-center justify-center gap-1 shadow-sm">
                    🔴 Mã YouTube
                </button>
            </div>
        </div>

        <div id="statusMessage" class="text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('shopeeLink').value = text;
            } catch (err) {
                showMessage("Trình duyệt chặn dán tự động, hãy dán thủ công.", "text-red-500");
            }
        }

        async function processLink(platform) {
            const inputLink = document.getElementById('shopeeLink').value.trim();
            const btnFb = document.getElementById('btnFb');
            const btnYt = document.getElementById('btnYt');
            
            if (!inputLink) {
                showMessage("Vui lòng nhập link sản phẩm!", "text-red-500");
                return;
            }

            // Đổi trạng thái nút bấm trong lúc chờ
            const originalFb = btnFb.innerHTML;
            const originalYt = btnYt.innerHTML;
            
            if (platform === 'facebook') {
                btnFb.innerHTML = "⏳ Đang xử lý...";
                btnFb.classList.add('opacity-50', 'cursor-not-allowed');
                btnYt.classList.add('opacity-50', 'pointer-events-none');
            } else {
                btnYt.innerHTML = "⏳ Đang xử lý...";
                btnYt.classList.add('opacity-50', 'cursor-not-allowed');
                btnFb.classList.add('opacity-50', 'pointer-events-none');
            }

            try {
                // Gửi yêu cầu lên Vercel kèm theo tên nền tảng
                const response = await fetch(`/api/resolve?url=${encodeURIComponent(inputLink)}&platform=${platform}`);
                const data = await response.json();

                if (response.ok && data.deepLink) {
                    showMessage(`Đang mở app để lấy mã ${platform}...`, "text-green-600");
                    window.location.href = data.deepLink;
                } else {
                    showMessage(data.error || "Có lỗi xảy ra.", "text-red-500");
                }
            } catch (error) {
                showMessage("Lỗi kết nối đến máy chủ.", "text-red-500");
            } finally {
                // Phục hồi nút bấm
                btnFb.innerHTML = originalFb;
                btnYt.innerHTML = originalYt;
                btnFb.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                btnYt.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            }
        }

        function showMessage(msg, colorClass) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = msg;
            statusDiv.className = `text-center text-sm font-medium mt-2 ${colorClass}`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => { statusDiv.classList.add('hidden'); }, 3000);
        }
    </script>
</body>
</html>
