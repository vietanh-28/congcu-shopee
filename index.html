<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Áp Mã Độc Quyền</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 border-t-4 border-orange-500">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Mở Nhanh Mã Độc Quyền</h1>
            <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded border border-orange-200">Bản Cố Định (Ổn định nhất)</span>
        </div>

        <div class="border-2 border-purple-400 rounded-xl p-4 mb-6">
            <label class="block text-xs font-semibold text-gray-500 mb-2">LINK DÀI SẢN PHẨM SHOPEE</label>
            <input type="text" id="shopeeLink" placeholder="Phải là link dài: https://shopee.vn/..." 
                class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 mb-4 text-sm focus:outline-none focus:border-purple-500">
            
            <button onclick="pasteLink()" class="w-full bg-purple-600 text-white font-semibold py-3 rounded-lg mb-4 hover:bg-purple-700 transition shadow-sm">
                📋 Dán sản phẩm
            </button>
            
            <div class="flex gap-2 mb-2">
                <button onclick="processLink('facebook')" class="w-1/2 bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-1 shadow-sm">
                    📘 Mã Facebook
                </button>
                <button onclick="processLink('youtube')" class="w-1/2 bg-red-600 text-white font-semibold py-3 rounded-lg hover:bg-red-700 transition flex items-center justify-center gap-1 shadow-sm">
                    🔴 Mã YouTube
                </button>
            </div>
        </div>

        <div id="statusMessage" class="text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // MÃ ĐỐI TÁC CỦA BẠN ĐÃ ĐƯỢC GẮN
        const MY_AFF_ID = "an_17355520340"; 

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('shopeeLink').value = text;
            } catch (err) {
                showMessage("Trình duyệt chặn dán tự động, hãy dán thủ công.", "text-red-500");
            }
        }

        function processLink(platform) {
            let inputLink = document.getElementById('shopeeLink').value.trim();
            
            if (!inputLink) {
                showMessage("Vui lòng nhập link sản phẩm!", "text-red-500");
                return;
            }

            // Bộ lọc: Bắt buộc phải là link dài, nếu là link ngắn sẽ báo lỗi ngay
            if (inputLink.includes('shp.ee') || inputLink.includes('s.shopee.vn')) {
                showMessage("BỊ CHẶN: Vercel không giải mã được link ngắn. Bạn phải copy LINK DÀI trên Safari/Chrome!", "text-red-500");
                return;
            }

            showMessage(`Đang mở app để lấy mã ${platform}...`, "text-green-600");

            // Nối trực tiếp mã Affiliate và thẻ nguồn
            let extraParams = `utm_source=${platform}&utm_medium=affiliate&utm_campaign=exclusive_voucher&aff_id=${MY_AFF_ID}`;
            let finalUrl = inputLink.includes('?') ? (inputLink + '&' + extraParams) : (inputLink + '?' + extraParams);

            // Chuyển thành link mở app
            let deepLink = finalUrl.replace(/^https?:\/\//, 'shopeevn://');

            // Ép mở app ngay lập tức
            let a = document.createElement('a');
            a.href = deepLink;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function showMessage(msg, colorClass) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = msg;
            statusDiv.className = `text-center text-sm font-medium mt-2 ${colorClass}`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => { statusDiv.classList.add('hidden'); }, 4000);
        }
    </script>
</body>
</html>
