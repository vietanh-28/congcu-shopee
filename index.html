<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Áp Mã Shopee Thực Tế</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 border-t-4 border-orange-500">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Mở Nhanh Mã</h1>
            <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded border border-orange-200">Hoạt Động Thật</span>
        </div>

        <div class="border-2 border-purple-400 rounded-xl p-4 mb-6">
            <label class="block text-xs font-semibold text-gray-500 mb-2">LINK SẢN PHẨM SHOPEE</label>
            <input type="text" id="shopeeLink" placeholder="https://shp.ee/..." 
                class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 mb-4 text-sm focus:outline-none focus:border-purple-500">
            
            <button onclick="pasteLink()" class="w-full bg-purple-600 text-white font-semibold py-3 rounded-lg mb-3 hover:bg-purple-700 transition">
                📋 Dán sản phẩm
            </button>
            
            <button id="actionBtn" onclick="processLink()" class="w-full bg-gradient-to-r from-orange-400 to-pink-500 text-white font-semibold py-3 rounded-lg mb-3 hover:opacity-90 transition">
                🚀 Mở áp mã nhanh
            </button>
        </div>

        <div id="statusMessage" class="text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('shopeeLink').value = text;
            } catch (err) {
                showMessage("Trình duyệt chặn dán tự động, hãy dán thủ công.", "text-red-500");
            }
        }

        async function processLink() {
            const inputLink = document.getElementById('shopeeLink').value.trim();
            const btn = document.getElementById('actionBtn');
            
            if (!inputLink) {
                showMessage("Vui lòng nhập link sản phẩm!", "text-red-500");
                return;
            }

            // Đổi trạng thái nút bấm
            btn.innerHTML = "⏳ Đang xử lý link...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // Gọi API backend để giải mã link
                const response = await fetch(`/api/resolve?url=${encodeURIComponent(inputLink)}`);
                const data = await response.json();

                if (response.ok && data.deepLink) {
                    showMessage("Đang mở ứng dụng Shopee...", "text-green-600");
                    // Chuyển hướng người dùng sang app Shopee
                    window.location.href = data.deepLink;
                } else {
                    showMessage(data.error || "Có lỗi xảy ra.", "text-red-500");
                }
            } catch (error) {
                showMessage("Lỗi kết nối đến máy chủ.", "text-red-500");
            } finally {
                // Phục hồi nút bấm
                btn.innerHTML = "🚀 Mở áp mã nhanh";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function showMessage(msg, colorClass) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = msg;
            statusDiv.className = `text-center text-sm font-medium mt-2 ${colorClass}`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => { statusDiv.classList.add('hidden'); }, 4000);
        }
    </script>
</body>
</html>
